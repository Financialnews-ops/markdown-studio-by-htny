name: Build & Release (Windows)

# Uruchamia się po wypchnięciu tagu w formacie v* (np. v2.0.0)
# Triggers on pushing a tag matching v* (e.g. v2.0.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer (NSIS)
        run: npm run dist:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          name: Markdown Studio ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
